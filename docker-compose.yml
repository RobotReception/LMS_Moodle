services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${LE_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - TZ=${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/letsencrypt:/letsencrypt
    networks:
      - edge
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  mariadb:
    image: mariadb:11.4
    environment:
      - TZ=${TZ}
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MOODLE_DATABASE_NAME}
      - MYSQL_USER=${MOODLE_DATABASE_USER}
      - MYSQL_PASSWORD=${MOODLE_DATABASE_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - TZ=${TZ}
    volumes:
      - ./data/redis:/data
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  moodle:
    build:
      context: .
      dockerfile: Dockerfile.moodle
    ports:
      - "5500:80"
    environment:
      - TZ=${TZ}
      - MOODLE_DATABASE_TYPE=mariadb
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT=3306
      - MOODLE_DATABASE_NAME=${MOODLE_DATABASE_NAME}
      - MOODLE_DATABASE_USER=${MOODLE_DATABASE_USER}
      - MOODLE_DATABASE_PASSWORD=${MOODLE_DATABASE_PASSWORD}
      - MOODLE_SITE_NAME=${MOODLE_SITE_NAME}
      - MOODLE_ADMIN_USER=${MOODLE_USERNAME}
      - MOODLE_ADMIN_PASSWORD=${MOODLE_PASSWORD}
      - MOODLE_ADMIN_EMAIL=${MOODLE_EMAIL}
      - MOODLE_LANG=${MOODLE_LANG}
      - MOODLE_URL=http://94.136.185.54:5500
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./data/moodledata:/var/moodledata
      - ./data/moodle:/var/www/html
    depends_on:
      - mariadb
      - redis
    networks:
      - edge
      - internal
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.moodle-http.rule=Host(`localhost`)
      - traefik.http.routers.moodle-http.entrypoints=web
      - traefik.http.routers.moodle-http.service=moodle
      - traefik.http.routers.moodle.rule=Host(`localhost`)
      - traefik.http.routers.moodle.entrypoints=websecure
      - traefik.http.routers.moodle.tls.certresolver=le
      - traefik.http.routers.moodle.service=moodle
      - traefik.http.services.moodle.loadbalancer.server.port=80
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

networks:
  edge:
    name: moodle_edge
  internal:
    name: moodle_internal
    internal: true
